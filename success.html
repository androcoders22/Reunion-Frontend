<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="google-site-verification" content="ugj2HjgmsHuTd4B68VYdCPzIDnvdVQCXWwaqpeGEYlo" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Jaipurian Re-union Pass</title>
  <link rel="icon" type="image/png" href="img/bg-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" async />
  <link rel="preconnect" href="https://fonts.gstatic.com" async crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Righteous&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet" async />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    :root {
      --bg: #071022;
      --accent-cyan: #00f3ff;
      --accent-blue: #3b82f6;
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    body {
      font-family: "Outfit", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(600px 300px at 10% 20%, rgba(0, 212, 255, 0.06), transparent),
        radial-gradient(600px 300px at 90% 80%, rgba(255, 77, 184, 0.04), transparent),
        var(--bg);
      color: #e6eef8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .page-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      width: 100%;
      max-width: 900px;
    }

    .pay-success {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 0;
    }

    .pay-success h2 {
      color: #22c55e;
      font-size: 1.2rem;
    }

    .header {
      text-align: center;
      margin: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.6px;
    }

    .header p {
      margin: 6px 0 0;
      color: rgba(230, 238, 248, 0.75);
      font-size: 0.92rem;
    }

    /* --- Pass Container --- */
    .pass-wrapper {
      position: relative;
      width: 800px;
      height: 260px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .pass-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* --- Dynamic Overlay Texts --- */
    .overlay-text {
      position: absolute;
      color: #000;
      font-family: "Courier Prime", monospace;
      font-weight: 700;
      font-size: 14px;
      text-align: left;
    }

    /* Image size: 4596 x 1496 */
    .field-name {
      top: 38.2%;
      left: 81.6%;
      width: 15%;
      line-height: 1;
      white-space: nowrap;
      font-size: 9px;
      color: #1a1a1a;
    }

    .field-city {
      top: 46.5%;
      left: 81.6%;
      width: 15%;
      font-size: 9px;
      white-space: nowrap;
    }

    .field-phone {
      top: 55.0%;
      left: 81.6%;
      width: 15%;
      font-size: 9px;
      white-space: nowrap;
    }

    .field-email {
      top: 63.5%;
      left: 81.6%;
      width: 16%;
      font-size: 8px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .field-persons {
      top: 69.8%;
      left: 93.3%;
      width: 25px;
      text-align: center;
      font-size: 10px;
    }

    .field-serial {
      top: 54.86%;
      left: 71.5%;
      width: 100px;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 6.5px;
      text-align: center;
      letter-spacing: 2px;
      color: white;
    }

    .field-serial-2 {
      top: 54.76%;
      left: 91.7%;
      width: 100px;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 6.5px;
      text-align: center;
      letter-spacing: 2px;
      color: rgb(112, 102, 102);
    }

    /* --- Dynamic QR Code --- */
    .qr-container {
      position: absolute;
      left: 81%;
      top: 4.2%;
      width: 8.1%;
      height: 25%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-container canvas {
      max-width: 100% !important;
      max-height: 100% !important;
    }

    /* --- Buttons --- */
    .actions-row {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      color: #000;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
      transition: transform 0.2s ease;
    }

    .btn-download:hover {
      transform: scale(1.05);
    }

    .btn-download:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #e6eef8;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Responsive */
    @media (max-width: 850px) {
      .pass-wrapper {
        width: 100%;
        height: auto;
        aspect-ratio: 4596 / 1496;
      }
    }

    @media (max-width: 480px) {
      .page-container {
        padding: 16px;
      }

      .header h1 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">

    <div class="pay-success">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      <h2>Payment Successful!</h2>
    </div>

    <div class="header">
      <h1>Your Reunion Event Pass</h1>
      <p>Download your pass below or check your email</p>
    </div>

    <!-- Pass Preview -->
    <div class="pass-wrapper" id="capture-area">
      <!-- Background Image -->
      <img src="img/FINALISED (1).jpg.jpeg" class="pass-bg" alt="Reunion Pass Design" />

      <!-- Dynamic Data Fields -->
      <div id="display-name" class="overlay-text field-name"></div>
      <div id="display-city" class="overlay-text field-city"></div>
      <div id="display-phone" class="overlay-text field-phone"></div>
      <div id="display-email" class="overlay-text field-email"></div>
      <div id="display-persons" class="overlay-text field-persons"></div>
      <div id="display-serial" class="overlay-text field-serial"></div>
      <div id="display-serial-2" class="overlay-text field-serial-2"></div>

      <!-- Dynamic QR Holder -->
      <div class="qr-container">
        <canvas id="qr-canvas"></canvas>
      </div>
    </div>

    <div class="actions-row">
      <a href="index.html" class="btn-back">← Back To Home</a>
      <button class="btn-download" id="downloadBtn" onclick="downloadPass()">
        Download High-Res PDF
      </button>
    </div>
  </div>

  <script>
    const BACKEND_URL_OF_SUCCESS = "https://api.ultimatejaipurians.in";

    // ──────────────────────────────────────
    //  Read URL params & populate the pass
    // ──────────────────────────────────────
    document.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);

      const userData = {
        user_name: params.get("user_name"),
        user_number: params.get("user_number"),
        city: params.get("city"),
        serialNo: params.get("serialNo"),
        how_many_people: params.get("how_many_people"),
        user_email: params.get("user_email"),
        qr_code: params.get("qr_code"),
        bookId: params.get("bookId"),
      };

      // Save to localStorage (for email / returning later)
      localStorage.setItem("no-people", userData.how_many_people);
      localStorage.setItem("city", userData.city);
      localStorage.setItem("phone", userData.user_number);
      localStorage.setItem("email", userData.user_email);
      localStorage.setItem("name", userData.user_name);
      localStorage.setItem("serialNo", userData.serialNo);
      localStorage.setItem("qr-code", userData.qr_code);
      localStorage.setItem("userSerial", userData.bookId);

      // Build serial string
      const paySerial = userData.serialNo || "";
      const userSerial = userData.bookId || "";
      const serialIndex = 8;
      const fullSerial =
        paySerial.slice(0, serialIndex + 1) +
        "S" + userSerial + "N" +
        paySerial.slice(serialIndex + 1);

      // Inject data into the pass
      injectData({
        name: userData.user_name || "",
        city: userData.city || "",
        phone: userData.user_number || "",
        email: userData.user_email || "",
        persons: String(userData.how_many_people || "1"),
        serial: fullSerial,
        qr_code: userData.qr_code || fullSerial,
      });
    });

    /**
     * Injecting Data & Generating QR
     */
    function injectData(data) {
      document.getElementById("display-name").innerText = data.name;
      document.getElementById("display-city").innerText = data.city;
      document.getElementById("display-phone").innerText = data.phone;
      document.getElementById("display-email").innerText = data.email;
      document.getElementById("display-persons").innerText =
        String(data.persons).padStart(2, "0");
      document.getElementById("display-serial").innerText = data.serial;
      document.getElementById("display-serial-2").innerText = data.serial;

      // Generate QR Code
      const qrData = `Name: ${data.name}\nSerial: ${data.serial}\nPhone: ${data.phone}`;
      const canvas = document.getElementById("qr-canvas");
      QRCode.toCanvas(
        canvas,
        qrData,
        {
          width: 60,
          margin: 2,
          color: {
            dark: "#000000",
            light: "#ffffff",
          },
        },
        function (error) {
          if (error) console.error(error);
          console.log("QR code generated for: " + data.serial);
        },
      );
    }

    // ──────────────────────────────────────
    //  Download Pass as PDF
    // ──────────────────────────────────────
    async function downloadPass() {
      const area = document.getElementById("capture-area");
      const downloadBtn = document.getElementById("downloadBtn");
      const originalText = downloadBtn.innerText;

      downloadBtn.innerText = "Generating PDF...";
      downloadBtn.disabled = true;

      try {
        const canvas = await html2canvas(area, {
          scale: 3,
          useCORS: true,
          logging: false,
          backgroundColor: null,
        });

        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
          orientation: "landscape",
          unit: "px",
          format: [canvas.width / 3, canvas.height / 3],
        });

        pdf.addImage(
          imgData,
          "PNG",
          0,
          0,
          canvas.width / 3,
          canvas.height / 3,
        );
        pdf.save(`ReunionPass_${Date.now()}.pdf`);
      } catch (err) {
        console.error("PDF Generation failed", err);
        alert("Failed to generate PDF. Check console for details.");
      } finally {
        downloadBtn.innerText = originalText;
        downloadBtn.disabled = false;
      }
    }

    // ──────────────────────────────────────
    //  Generate PDF blob (for emailing)
    // ──────────────────────────────────────
    async function generatePdfBlob() {
      const area = document.getElementById("capture-area");
      const canvas = await html2canvas(area, {
        scale: 3,
        useCORS: true,
        logging: false,
        backgroundColor: null,
      });

      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF({
        orientation: "landscape",
        unit: "px",
        format: [canvas.width / 3, canvas.height / 3],
      });

      pdf.addImage(imgData, "PNG", 0, 0, canvas.width / 3, canvas.height / 3);
      return pdf.output("blob");
    }

    // ──────────────────────────────────────
    //  Auto-send email with PDF on page load
    // ──────────────────────────────────────
    if (!localStorage.getItem("fromLogin")) {
      window.addEventListener("load", () => {
        setTimeout(sendEmailPDF, 1000);
      });
    }

    async function sendEmailPDF() {
      const emailReceiver = localStorage.getItem("email");

      try {
        const pdfBlob = await generatePdfBlob();
        const file = new File(
          [pdfBlob],
          `ticket-${new Date().toISOString().slice(0, 10)}.pdf`,
          { type: "application/pdf" },
        );
        const formData = new FormData();
        formData.append("file", file);
        formData.append("to", emailReceiver);
        formData.append("subject", "Your Event Ticket");
        formData.append("text", "Please find your ticket attached.");

        const resp = await fetch(`${BACKEND_URL_OF_SUCCESS}/api/upload-pdf`, {
          method: "POST",
          body: formData,
        });

        if (!resp.ok) {
          const json = await resp.json().catch(() => ({}));
          console.error("Upload failed", json);
        } else {
          console.log("Uploaded & emailed successfully");
        }
      } catch (err) {
        console.error("sendEmailPDF error:", err);
      }
    }
  </script>
</body>

</html>
